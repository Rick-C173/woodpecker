server:
  host: "0.0.0.0"
  port: 8080
  mode: debug

llm:
  provider: kimi
  model: moonshot-v1-auto
  base_url: https://api.moonshot.cn/v1
  api_key: "sk-xxx"
  max_tokens: 4096
  timeout: 60

review:
  max_files_per_request: 20
  max_diff_chars: 50000
  default_language: go
  ignore_patterns:
    - "*.lock"
    - "*.sum"
    - "vendor/**"
    - "node_modules/**"
    - "*.pb.go"
    - "*_gen.go"
